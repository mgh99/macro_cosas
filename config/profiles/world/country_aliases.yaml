# ============================================================
# COUNTRY ALIASES — WORLD PROFILE
# ============================================================
#
# Este archivo sirve para convertir nombres de países escritos
# por el usuario en códigos ISO2 (ES, FR, US, etc.).
#
# Ejemplo:
#
# Usuario escribe:
#   "Spain, usa, deutschland"
#
# El sistema lo convierte a:
#   ES, US, DE
#
# ------------------------------------------------------------
# REGLAS IMPORTANTES
# ------------------------------------------------------------
#
# - Las claves deben escribirse en minúsculas
# - Sin acentos preferiblemente
# - Pueden incluir errores comunes o abreviaciones
#
# Ejemplo:
#
#   spain: ES
#   espana: ES
#   españa: ES
#
# ------------------------------------------------------------
# QUÉ SE PUEDE AÑADIR
# ------------------------------------------------------------
#
# Si un país no se reconoce, puedes añadir una nueva línea:
#
#   nombre_que_escribe_el_usuario: ISO2
#
# Ejemplo:
#
#   italia: IT
#
# ------------------------------------------------------------


# =========================
# Spain
# =========================
sp: ES
esp: ES
spa: ES
spain: ES
españa: ES
espana: ES


# =========================
# United States
# =========================
usa: US
us: US
united states: US
unitedstates: US
eeuu: US
euu: US


