# config/profiles/world/frameworks.yaml
version: 1

frameworks:
  economics:
    title: "ECONOMICS FRAMEWORK"
    indicators:

      # 1) Consumer Confidence Index (OECD, monthly)
      - id: "E1"
        name: consumer_confidence_index
        source: oecd
        enabled: true

        dataset_id: "OECD.SDD.STES,DSD_STES@DF_CLI,"
        selection_template: "{geo}.M.CCICP...AA...H"

        frequency: M
        time:
          mode: past_years
          years: 5

        units: "index"
        geo_level: country
        reference: "https://www.oecd.org/en/data/indicators/consumer-confidence-index-cci.html"

      # 2) GDP current prices (IMF Datamapper)
      - id: "E2"
        name: gdp_current_prices
        source: imf_datamapper
        enabled: true

        indicator_code: "NGDPD"
        geo_level: country
        frequency: A

        time:
          mode: past_and_future_years
          past_years: 9
          future_years: 1

        units: "billions_of_dollars"
        reference: "https://www.imf.org/external/datamapper/NGDPD@WEO/ADVEC/WEOWORLD"

      # 3) GDP per capita current prices (IMF Datamapper)
      - id: "E3"
        name: gdp_per_capita_current_prices
        source: imf_datamapper
        enabled: true

        indicator_code: "NGDPDPC"
        geo_level: country
        frequency: A

        time:
          mode: past_and_future_years
          past_years: 10
          future_years: 5

        units: "dollars_per_capita"
        reference: "https://www.imf.org/external/datamapper/NGDPDPC@WEO/ADVEC/WEOWORLD"

      # 4) Harmonised index of consumer prices / Inflation (WEO)
      - id: "E4"
        name: harmonised_index_of_consumer_prices
        source: imf_datamapper
        enabled: true

        indicator_code: "PCPIEPCH"
        geo_level: country
        frequency: A

        time:
          mode: past_and_future_years
          past_years: 5
          future_years: 5

        units: "percent"
        reference: "https://data.imf.org/en/Data-Explorer?datasetUrn=IMF.RES:WEO(9.0.0)&INDICATOR=PCPIEPCH"

      # 5) Income share held by highest 10% (World Bank, %)
      - id: "E5"
        name: income_share_held_by_highest_10_percent
        source: world_bank_group
        enabled: true

        indicator_id: "SI.DST.10TH.10"
        geo_level: country
        frequency: A

        time:
          mode: past_years
          years: 10

        units: "percent"
        reference: "https://data.worldbank.org/indicator/SI.DST.10TH.10"

      # 6) Income share held by lowest 10% (World Bank, %)
      - id: "E6"
        name: income_share_held_by_lowest_10_percent
        source: world_bank_group
        enabled: true

        indicator_id: "SI.DST.FRST.10"
        geo_level: country
        frequency: A

        time:
          mode: past_years
          years: 10

        units: "percent"
        reference: "https://data.worldbank.org/indicator/SI.DST.FRST.10"

      # 7) Population (IMF WEO, millions of people)
      - id: "E7"
        name: population
        source: imf_datamapper
        enabled: true

        indicator_code: "LP"
        geo_level: country
        frequency: A

        time:
          mode: past_and_future_years
          past_years: 4
          future_years: 4

        units: "millions_of_people"
        reference: "https://www.imf.org/external/datamapper/LP@WEO/OEMDC/ADVEC/WEOWORLD"

      # 8) Real GDP growth (% change, constant prices)
      - id: "E8"
        name: real_gdp_growth_percent
        source: imf_datamapper
        enabled: true

        indicator_code: "NGDP_RPCH"
        geo_level: country
        frequency: A

        time:
          mode: past_and_future_years
          past_years: 5
          future_years: 5

        units: "percent"
        reference: "https://www.imf.org/external/datamapper/NGDP_RPCH@WEO/ADVEC/WEOWORLD"

      # 9) Unemployment rate (IMF Datamapper)
      - id: "E9"
        name: unemployment_rate
        source: imf_datamapper
        enabled: true

        indicator_code: "LUR"
        geo_level: country
        frequency: A

        time:
          mode: past_and_future_years
          past_years: 4
          future_years: 1

        units: "percent"
        reference: "https://www.imf.org/external/datamapper/LUR@WEO/ADVEC/WEOWORLD"

      # 10) Youth unemployment, ages 15-24 (% of total labor force) (modeled ILO estimate) — World Bank
      - id: "E10"
        name: unemployment_youth_total_15_24_percent
        source: world_bank_group
        enabled: true

        indicator_id: "SL.UEM.1524.ZS"
        geo_level: country
        frequency: A

        time:
          mode: past_years
          years: 10

        units: "percent"
        reference: "https://data.worldbank.org/indicator/SL.UEM.1524.ZS"

  tourism:
    title: "TOURISM FRAMEWORK"
    indicators:

      - id: "T1"
        name: UN_Tourism_8_9_1_TDGDP_04_2025
        source: un_tourism_zip
        enabled: true

        zip_path: "data/un_tourism_zips/UN_Tourism_8_9_1_TDGDP_04_2025.zip"
        xlsx_glob: "*.xlsx"
        sheet: "SDG 8.9.1"

        series_code: "ST_GDP_ZS"
        geo_level: country
        frequency: A

        time:
          mode: past_years
          years: 10

        units: "percent"

      - id: "T2"
        name: UN_Tourism_accommodation_hotels_12_2025
        source: un_tourism_xlsx
        enabled: true

        xlsx_url: "https://pre-webunwto.s3.amazonaws.com/s3fs-public/2025-12/UN_Tourism_accommodation_hotels_12_2025.xlsx"
        xlsx_cache_path: "data/un_tourism_xlsx/UN_Tourism_accommodation_hotels_12_2025.xlsx"
        sheet: "Data"

        reporter_area_code_field: "reporter_area_code"

        # Filtro por indicator_label
        indicator_label_equals:
          - "capacity - accommodation - short-term accommodation, hotels and similar (ISIC 5510) - length of stay - average"

        # Solo hay una serie → no necesitamos sub-indicador complejo
        sub_indicator_field: null

        geo_level: country
        frequency: A

        time:
          mode: past_years
          years: 10

        units: "overnights"

      - id: "T3"
        name: UN_Tourism_domestic_accommodation_12_2025
        source: un_tourism_xlsx
        enabled: true

        xlsx_url: "https://pre-webunwto.s3.amazonaws.com/s3fs-public/2025-12/UN_Tourism_domestic_accommodation_12_2025.xlsx"
        xlsx_cache_path: "data/un_tourism_xlsx/UN_Tourism_domestic_accommodation_12_2025.xlsx"
        sheet: "Data"

        reporter_area_code_field: "reporter_area_code"

        # Filtro por indicator_label
        indicator_label_equals:
          - "domestic - accommodation - short-term accommodation, hotels and similar (ISIC 5510) - overnights"

        geo_level: country
        frequency: A

        time:
          mode: past_years
          years: 10

        units: "thousand_overnights"

      - id: "T4"
        name: UN_Tourism_domestic_trips_12_2025
        source: un_tourism_xlsx
        enabled: true

        xlsx_url: "https://pre-webunwto.s3.amazonaws.com/s3fs-public/2025-12/UN_Tourism_domestic_trips_12_2025.xlsx"
        xlsx_cache_path: "data/un_tourism_xlsx/UN_Tourism_domestic_trips_12_2025.xlsx"
        sheet: "Data"

        reporter_area_code_field: "reporter_area_code"

        # Filtro por indicator_label
        indicator_label_equals:
          - "domestic - trips - total - total - visitors"

        # Solo hay una serie → no necesitamos sub-indicador
        sub_indicator_field: null

        geo_level: country
        frequency: A

        time:
          mode: past_years
          years: 10

        units: "thousand_trips"

      - id: "T5"
        name: UN_Tourism_inbound_accommodation_12_2025
        source: un_tourism_xlsx
        enabled: true

        xlsx_url: "https://pre-webunwto.s3.amazonaws.com/s3fs-public/2025-12/UN_Tourism_inbound_accommodation_12_2025.xlsx"
        xlsx_cache_path: "data/un_tourism_xlsx/UN_Tourism_inbound_accommodation_12_2025.xlsx"
        sheet: "Data"

        reporter_area_code_field: "reporter_area_code"

        indicator_label_equals:
          - "inbound - accommodation - short-term accommodation, hotels and similar (ISIC 5510) - overnights"

        # para que el sub_indicator_short sea ese label (o lo que tú quieras)
        sub_indicator_field: "indicator_label"

        geo_level: country
        frequency: A

        time:
          mode: past_years
          years: 10

        units: "thousand_overnights"

      - id: "T6"
        name: UN_Tourism_inbound_arrivals_by_purpose_12_2025
        source: un_tourism_xlsx
        enabled: true

        xlsx_url: "https://pre-webunwto.s3.amazonaws.com/s3fs-public/2025-12/UN_Tourism_inbound_arrivals_by_purpose_12_2025.xlsx"
        xlsx_cache_path: "data/un_tourism_xlsx/UN_Tourism_inbound_arrivals_by_purpose_12_2025.xlsx"
        sheet: "Data"

        reporter_area_code_field: "reporter_area_code"

        indicator_code_equals:
          - "INBD_TRIP_PRPS_BNSS_TOUR"
          - "INBD_TRIP_PRPS_PERS_TOUR"

        # Para que sub_indicator_short sea el purpose (y no "World")
        sub_indicator_field: "indicator_code"

        geo_level: country
        frequency: A

        time:
          mode: past_years
          years: 10

        units: "thousand_trips"

      - id: "T7"
        name: UN_Tourism_inbound_arrivals_by_region_12_2025
        source: un_tourism_xlsx
        enabled: true

        #debug: true

        xlsx_url: "https://pre-webunwto.s3.amazonaws.com/s3fs-public/2025-12/UN_Tourism_inbound_arrivals_by_region_12_2025.xlsx"
        xlsx_cache_path: "data/un_tourism_xlsx/UN_Tourism_inbound_arrivals_by_region_12_2025.xlsx"
        sheet: "Data"

        # este dataset ya trae "reporter_area_code" (M49) y "partner_area_label" (región)
        reporter_area_code_field: "reporter_area_code"
        partner_area_label_field: "partner_area_label"

        # el “filter” tuyo en realidad es indicator_code prefix
        indicator_code_prefix: "INBD_TRIP_REGN_TOUR"

        geo_level: country
        frequency: A

        time:
          mode: past_years
          years: 10

        units: "thousand_trips"

        partner_area_labels:
          - "Africa (UNWTO total)"
          - "Americas (UNWTO total)"
          - "East Asia and the Pacific (UNWTO total)"
          - "Europe (UNWTO total)"
          - "Middle East (UNWTO total)"
          - "South Asia (UNWTO total)"

      - id: "T8"
        name: UN_Tourism_inbound_arrivals_by_transport_12_2025
        source: un_tourism_xlsx
        enabled: true

        xlsx_url: "https://pre-webunwto.s3.amazonaws.com/s3fs-public/2025-12/UN_Tourism_inbound_arrivals_by_transport_12_2025.xlsx"
        xlsx_cache_path: "data/un_tourism_xlsx/UN_Tourism_inbound_arrivals_by_transport_12_2025.xlsx"
        sheet: "Data"

        reporter_area_code_field: "reporter_area_code"

        indicator_label_equals:
          - "inbound - trips - transport - air - overnight visitors (tourists)"
          - "inbound - trips - transport - by land - overnight visitors (tourists)"
          - "inbound - trips - transport - water - overnight visitors (tourists)"

        # Para que sub_indicator_short sea AIR/LAND/WATER (bonito y legible)
        sub_indicator_field: "indicator_label"

        geo_level: country
        frequency: A

        time:
          mode: past_years
          years: 10

        units: "thousand_trips"
        #debug: true

      - id: "T9"
        name: UN_Tourism_inbound_expenditure_12_2025
        source: un_tourism_xlsx
        enabled: true

        xlsx_url: "https://pre-webunwto.s3.amazonaws.com/s3fs-public/2025-12/UN_Tourism_inbound_expenditure_12_2025.xlsx"
        xlsx_cache_path: "data/un_tourism_xlsx/UN_Tourism_inbound_expenditure_12_2025.xlsx"
        sheet: "Data"

        reporter_area_code_field: "reporter_area_code"

        # Filtro por indicator_label
        indicator_label_equals:
          - "inbound - expenditure - balance of payments - total - visitors"

        # Para que el sub_indicator_short sea limpio
        sub_indicator_field: "indicator_label"

        geo_level: country
        frequency: A

        time:
          mode: past_years
          years: 10

        units: "million_US_dollars"

