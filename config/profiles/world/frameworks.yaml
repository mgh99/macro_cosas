# config/profiles/world/frameworks.yaml
version: 1

frameworks:
  economics:
    title: "ECONOMICS FRAMEWORK"
    indicators:

      # 1) Unemployment rate (IMF Datamapper)
      - id: "E1"
        name: unemployment_rate
        source: imf_datamapper
        enabled: true

        indicator_code: "LUR"
        geo_level: country
        frequency: A

        time:
          mode: past_years
          years: 5

        units: "percent"
        reference: "https://www.imf.org/external/datamapper/LUR@WEO/ADVEC/WEOWORLD"

      # 2) GDP current prices (IMF Datamapper)
      - id: "E2"
        name: gdp_current_prices
        source: imf_datamapper
        enabled: true

        indicator_code: "NGDPD"
        geo_level: country
        frequency: A

        time:
          mode: past_years
          years: 10

        units: "billions_of_dollars"
        reference: "https://www.imf.org/external/datamapper/NGDPD@WEO/ADVEC/WEOWORLD"

      # 3) GDP per capita current prices (IMF Datamapper)
      - id: "E3"
        name: gdp_per_capita_current_prices
        source: imf_datamapper
        enabled: true

        indicator_code: "NGDPDPC"
        geo_level: country
        frequency: A

        time:
          mode: past_and_future_years
          past_years: 10
          future_years: 5

        units: "dollars_per_capita"
        reference: "https://www.imf.org/external/datamapper/NGDPDPC@WEO/ADVEC/WEOWORLD"

      # 4) Real GDP growth (% change, constant prices)
      - id: "E4"
        name: real_gdp_growth_percent
        source: imf_datamapper
        enabled: true

        indicator_code: "NGDP_RPCH"
        geo_level: country
        frequency: A

        time:
          mode: past_and_future_years
          past_years: 5
          future_years: 5

        units: "percent"
        reference: "https://www.imf.org/external/datamapper/NGDP_RPCH@WEO/ADVEC/WEOWORLD"

      # 5) Inflation – average consumer prices (% change)
      - id: "E5"
        name: inflation_average_consumer_prices
        source: imf_datamapper
        enabled: true

        indicator_code: "PCPIEPCH"
        geo_level: country
        frequency: A

        time:
          mode: past_and_future_years
          past_years: 5
          future_years: 5

        units: "percent"
        reference: "https://www.imf.org/external/datamapper/PCPIEPCH@WEO/ADVEC/WEOWORLD"

      # 6) Consumer Confidence Index (OECD, monthly)
      - id: "E6"
        name: consumer_confidence_index
        source: oecd
        enabled: true

        dataset_id: "OECD.SDD.STES,DSD_STES@DF_CLI,"
        selection_template: "{geo}.M.CCICP...AA...H"

        frequency: M
        time:
          mode: past_years
          years: 5

        units: "index"
        geo_level: country
        reference: "https://www.oecd.org/en/data/indicators/consumer-confidence-index-cci.html"

      # 7) Income share held by highest 10% (World Bank, %)
      - id: "E7"
        name: income_share_held_by_highest_10_percent
        source: world_bank_group
        enabled: true

        indicator_id: "SI.DST.10TH.10"
        geo_level: country
        frequency: A

        time:
          mode: past_years
          years: 10

        units: "percent"
        reference: "https://data.worldbank.org/indicator/SI.DST.10TH.10"

      # 8) Income share held by lowest 10% (World Bank, %)
      - id: "E8"
        name: income_share_held_by_lowest_10_percent
        source: world_bank_group
        enabled: true

        indicator_id: "SI.DST.FRST.10"
        geo_level: country
        frequency: A

        time:
          mode: past_years
          years: 10

        units: "percent"
        reference: "https://data.worldbank.org/indicator/SI.DST.FRST.10"

      # 9) Youth unemployment, ages 15-24 (% of total labor force) (modeled ILO estimate) — World Bank
      - id: "E9"
        name: unemployment_youth_total_15_24_percent
        source: world_bank_group
        enabled: true

        indicator_id: "SL.UEM.1524.ZS"
        geo_level: country
        frequency: A

        time:
          mode: past_years
          years: 10

        units: "percent"
        reference: "https://data.worldbank.org/indicator/SL.UEM.1524.ZS"

  tourism:
    title: "TOURISM FRAMEWORK"
    indicators:

      - id: "T1"
        name: UN_Tourism_8_9_1_TDGDP_04_2025
        source: un_tourism_zip
        enabled: true

        zip_path: "data/un_tourism_zips/UN_Tourism_8_9_1_TDGDP_04_2025.zip"
        xlsx_glob: "*.xlsx"
        sheet: "SDG 8.9.1"

        series_code: "ST_GDP_ZS"
        geo_level: country
        frequency: A

        time:
          mode: past_years
          years: 10

        units: "percent"

      - id: "T2"
        name: UN_Tourism_inbound_arrivals_by_region_12_2025
        source: un_tourism_xlsx
        enabled: true

        xlsx_url: "https://pre-webunwto.s3.amazonaws.com/s3fs-public/2025-12/UN_Tourism_inbound_arrivals_by_region_12_2025.xlsx"
        xlsx_cache_path: "data/un_tourism_xlsx/UN_Tourism_inbound_arrivals_by_region_12_2025.xlsx"
        sheet: "Data"

        # este dataset ya trae "reporter_area_code" (M49) y "partner_area_label" (región)
        reporter_area_code_field: "reporter_area_code"
        partner_area_label_field: "partner_area_label"

        # el “filter” tuyo en realidad es indicator_code prefix
        indicator_code_prefix: "INBD_TRIP_REGN_TOUR"

        geo_level: country
        frequency: A
        time:
          mode: past_years
          years: 10

        units: "thousand_trips"

        partner_area_labels:
          - "Africa (UNWTO total)"
          - "Americas (UNWTO total)"
          - "East Asia and the Pacific (UNWTO total)"
          - "Europe (UNWTO total)"
          - "Middle East (UNWTO total)"
          - "South Asia (UNWTO total)"

      - id: "T3"
        name: UN_Tourism_inbound_arrivals_by_purpose_12_2025
        source: un_tourism_xlsx
        enabled: true

        xlsx_url: "https://pre-webunwto.s3.amazonaws.com/s3fs-public/2025-12/UN_Tourism_inbound_arrivals_by_purpose_12_2025.xlsx"
        xlsx_cache_path: "data/un_tourism_xlsx/UN_Tourism_inbound_arrivals_by_purpose_12_2025.xlsx"
        sheet: "Data"

        reporter_area_code_field: "reporter_area_code"

        # nuevo (genérico): dónde vive el “purpose” para sub_indicator_short
        sub_indicator_field: "purpose_label"   # EJEMPLO

        # nuevo: filtrar solo las 2 series deseadas
        indicator_code_equals:
          - "INBD_TRIP_PURP_BUSN_TOUR"         # EJEMPLO
          - "INBD_TRIP_PURP_PERS_TOUR"         # EJEMPLO

        geo_level: country
        frequency: A
        time:
          mode: past_years
          years: 10

        units: "thousand_trips"
