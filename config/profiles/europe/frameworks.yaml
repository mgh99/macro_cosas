# ============================================================
# MACRO STRATEGY ENGINE — FRAMEWORK CONFIGURATION
# ============================================================
#
# Este archivo define QUÉ indicadores se descargan
# y de QUÉ fuentes de datos (Eurostat, IMF, OECD, etc).
#
# El sistema usa este archivo para generar:
# - CSV con los datos
# - Excel con visualizaciones
# - Informes automáticos con AI
#
# Cada "framework" es un grupo de indicadores relacionados.
#
# Ejemplo:
# demographics → indicadores de población
# tourism → indicadores de turismo
# economics → indicadores económicos
#
# ------------------------------------------------------------
# ⚠️ IMPORTANTE
# ------------------------------------------------------------
# - No borrar los ":" ni cambiar el formato
# - Cada indicador empieza con "- id:"
# - La indentación (espacios) es importante en YAML
#
# Si algo deja de funcionar normalmente es por:
# - quitar espacios
# - borrar ":" accidentalmente
#
# ------------------------------------------------------------
# CAMPOS PRINCIPALES DE UN INDICADOR
# ------------------------------------------------------------
#
# id:
#   Identificador interno del indicador
#
# name:
#   Nombre interno usado en los archivos generados
#
# source:
#   Fuente de datos (eurostat / imf_datamapper / oecd)
#
# dataset:
#   Código del dataset en la fuente de datos
#
# frequency:
#   A = Annual (anual)
#   M = Monthly (mensual)
#
# time:
#   Cuántos años de datos queremos descargar
#
# filters:
#   Filtros fijos del dataset
#
# multi_filters:
#   Varias series dentro del mismo indicador
#
# units:
#   Unidad del indicador (solo informativo)
#
# reference:
#   Link al dataset original
#
# ------------------------------------------------------------
# CÓMO AÑADIR UN NUEVO INDICADOR
# ------------------------------------------------------------
#
# Copiar uno existente y cambiar:
#
# - id
# - name
# - dataset
# - reference
#
# Ejemplo mínimo:
#
# - id: "NEW1"
#   name: example_indicator
#   source: eurostat
#   dataset: dataset_code
#   geo_level: country
#   frequency: A
#
# ------------------------------------------------------------
version: 1

frameworks:
  demographics:
    title: "DEMOGRAPHICS FRAMEWORK"
    indicators:

      # 1) Population by age group (share of total population)
      - id: "1"
        name: population_by_age_group
        source: eurostat
        enabled: true
        dataset: tps00010
        geo_level: country
        frequency: A
        time:
          mode: past_years
          years: 10

        # OJO: este dataset NO tiene dim "unit" (tu unit viene por fallback)
        multi_filters:
          indic_de:
            - "Proportion of population aged 0-14 years"
            - "Proportion of population aged 15-24 years"
            - "Proportion of population aged 25-49 years"
            - "Proportion of population aged 50-64 years"
            - "Proportion of population aged 65-79 years"
            - "Proportion of population aged 80 years and more"

        units: "%"
        reference: "https://ec.europa.eu/eurostat/databrowser/view/tps00010/default/table?lang=en"

      # 2) Population change, demographic balance and crude rates (national level)
      - id: "2"
        name: population_change_demographic_balance_and_crude_rates_at_national_level
        source: eurostat
        enabled: true
        dataset: demo_gind
        geo_level: country
        frequency: A
        time:
          mode: past_years
          years: 10

        filters: {}

        # Dim real del dataset: indic_de
        multi_filters:
          indic_de:
            - "Net migration plus statistical adjustment"
            - "Natural change of population"

        units: "people"
        reference: "https://ec.europa.eu/eurostat/databrowser/view/demo_gind__custom_20234960/default/table"

      # 3) Educational attainment (25-64), upper secondary or more — TOTAL
      - id: "3"
        name: persons_aged_25_-_64_with_at_least_upper_secondary_educational_attainment_level_by_sex
        source: eurostat
        enabled: true
        dataset: tps00065
        geo_level: country
        frequency: A
        time:
          mode: past_years
          years: 10

        # Fijamos dims para que sea "total" (y no te saque M/F también)
        filters:
          sex: "T"
          age: "Y25-64"
          unit: "PC"
          isced11: "ED3-8"

        units: "%"
        reference: "https://ec.europa.eu/eurostat/databrowser/view/tps00065/default/table?lang=en"

      # 4) Average household size
      - id: "4"
        name: average_household_size
        source: eurostat
        enabled: true
        dataset: ilc_lvph01
        geo_level: country
        frequency: A
        time:
          mode: past_years
          years: 10

        # Dim real: unit=AVG (Average)
        filters:
          unit: "AVG"

        units: "people"
        reference: "https://ec.europa.eu/eurostat/databrowser/view/ilc_lvph01/default/table?lang=en"

      # 5) Short-term population projections 2024-2050 (baseline) — Population on 1 Jan total
      - id: "5"
        name: short_term_population_projections_2024_-_2050
        source: eurostat
        enabled: true
        dataset: proj_stp25
        geo_level: country
        frequency: A
        time:
          mode: future_years
          years: 10

        filters:
          projection: "BSL"   # Baseline projections

        multi_filters:
          indic_de:
            - "Population on 1 January - total"

        units: "people"
        reference: "https://ec.europa.eu/eurostat/databrowser/view/proj_stp25/default/table?lang=en"

  tourism:
    title: "TOURISM FRAMEWORK"
    indicators:

      - id: "1a"
        name: arrivals_at_tourist_accommodation_establishments
        source: eurostat
        enabled: true
        dataset: tour_occ_arnat
        geo_level: country
        frequency: A
        time:
          mode: past_years
          years: 11

        filters:
          c_resid: "TOTAL"   # Total country of residence
          unit: "NR"         # Number
          nace_r2: "I551"    # Hotels and similar accommodation

        units: "number"
        reference: "https://ec.europa.eu/eurostat/databrowser/view/tour_occ_arnat/default/table?lang=en"

      - id: "1b"
        name: arrivals_by_origin_hotels_number
        source: eurostat
        enabled: true
        dataset: tour_occ_arnraw
        geo_level: country
        frequency: A
        time:
          mode: past_years
          years: 6

        # fijamos “hotels and similar”
        filters:
          nace_r2: "I551"
          unit: "NR"      # Number  (CONFIRMAR con describe_dataset)

        units: "number"
        describe_overrides:
          freq: "A"
          unit: "NR"
          nace_r2: "I551"
        reference: "https://ec.europa.eu/eurostat/databrowser/view/tour_occ_arnraw/default/table?lang=en"

      - id: "2"
        name: nights_spent_at_tourist_accommodation_establishments_by_residents_non_residents
        source: eurostat
        enabled: true
        dataset: tin00175
        geo_level: country
        frequency: A
        time:
          mode: past_years
          years: 11

        # fijamos unit + tipo alojamiento
        filters:
          unit: "NR"
          nace_r2: "I551-I553"

        # series dentro del indicador (DOM/FOR/TOTAL)
        multi_filters:
          c_resid:
            # NO CAMBIAR LOS CODIGOS, PQ ES COMO EUROSTAT LOS LLAMA Y ASÍ TE LOS TRAE LIMPIOS (si pones "domestic" en vez de "DOM" no te lo filtra y te sale todo mezclado)
            - "TOTAL"
            - "DOM" # domestic_country
            - "FOR" # foreign_country

        units: "number"
        describe_overrides:
          freq: "A"
          unit: "NR"
          nace_r2: "I551-I553"
          c_resid: "TOTAL"

        reference: "https://ec.europa.eu/eurostat/databrowser/view/tin00175/default/table?lang=en"

      - id: "3"
        name: nights_spent_by_duration_purpose_and_main_destination_of_the_trip
        source: eurostat
        enabled: true
        dataset: tour_dem_tntot
        geo_level: country
        frequency: A
        time:
          mode: past_years
          years: 11

        filters:
          c_dest: "WORLD"
          purpose: "TOTAL"
          unit: "NR"

        multi_filters:
          duration:
            - "N_GE1"  # 1 night or over
            - "N1-3"   # From 1 to 3 nights
            - "N_GE4"  # 4 nights or over

        units: "number"

        # OJO: NO fijes duration aquí (si lo fijas, el describe te lo recorta)
        describe_overrides:
          freq: "A"
          unit: "NR"
          c_dest: "WORLD"
          purpose: "TOTAL"

        reference: "https://ec.europa.eu/eurostat/databrowser/view/tour_dem_tntot/default/table?lang=en&category=tour.tour_dem.tour_dem_tn"

      - id: "4"
        name: trips_by_duration_purpose_and_main_destination
        source: eurostat
        enabled: true
        dataset: tour_dem_tttot
        geo_level: country
        frequency: A
        time:
          mode: past_years
          years: 11

        filters:
          c_dest: "WORLD"     # All countries of the world
          duration: "N_GE1"   # 1 night or over
          unit: "NR"          # Number

        multi_filters:
          purpose:
            - "PER"           # Personal reasons
            - "PROF"          # Professional, business

        units: "number"

        describe_overrides:
          freq: "A"
          c_dest: "WORLD"
          duration: "N_GE1"
          unit: "NR"
          purpose: "TOTAL"    # opcional, pero ayuda a que describe sea estable

        reference: "https://ec.europa.eu/eurostat/databrowser/view/tour_dem_tttot/default/table?lang=en"

      - id: "5"
        name: average_expenditure_per_trip
        source: eurostat
        enabled: true
        dataset: tin00195
        geo_level: country
        frequency: A
        time:
          mode: past_years
          years: 6

        filters:
          purpose: "TOTAL"
          duration: "N_GE1"
          c_dest: "WORLD"
          expend: "TOTXDUR"
          statinfo: "AVG_TRP"
          unit: "EUR"

        units: "euro"

        describe_overrides:
          freq: "A"
          purpose: "TOTAL"
          duration: "N_GE1"
          c_dest: "WORLD"
          expend: "TOTXDUR"
          statinfo: "AVG_TRP"
          unit: "EUR"

        reference: "https://ec.europa.eu/eurostat/databrowser/view/tin00195/default/table?lang=en"

      - id: "6"
        name: nights_spent_monthly_hotels
        source: eurostat
        enabled: true
        dataset: tour_occ_nim
        geo_level: country
        frequency: M
        time:
          mode: past_years
          years: 6

        filters:
          c_resid: "TOTAL"
          nace_r2: "I551"
          unit: "NR"

        units: "number"

        describe_overrides:
          freq: "M"
          c_resid: "TOTAL"
          nace_r2: "I551"
          unit: "NR"

        reference: "https://ec.europa.eu/eurostat/databrowser/view/tour_occ_nim/default/table?lang=en"

  economics:
    title: "ECONOMICS FRAMEWORK"
    indicators:

      - id: "E1"
        name: population
        source: imf_datamapper
        enabled: true

        # DataMapper uses indicator codes like LP, NGDP_RPCH, etc.
        indicator_code: "LP"
        dataset: "WEO"              # opcional, solo para documentación

        geo_level: country
        frequency: A

        time:
          mode: past_and_future_years
          past_years: 5
          future_years: 5

        units: "millions_of_people"
        reference: "https://www.imf.org/external/datamapper/LP@WEO/ADVEC/WEOWORLD"

      - id: "E2"
        name: unemployment_rate
        source: imf_datamapper
        enabled: true
        indicator_code: "LUR"
        geo_level: country
        frequency: A
        time:
          mode: past_years
          years: 5
        units: "percent"
        allow_aggregates: true
        reference: "https://www.imf.org/external/datamapper/LUR@WEO/ADVEC/WEOWORLD"

      - id: "E3"
        name: gdp_current_prices
        source: imf_datamapper
        enabled: true
        indicator_code: "NGDPD"
        geo_level: country
        frequency: A
        time:
          mode: past_years
          years: 10
        units: "billions_of_dollars"
        allow_aggregates: true
        reference: "https://www.imf.org/external/datamapper/NGDPD@WEO/ADVEC/WEOWORLD"

      - id: "E4"
        name: gdp_per_capita_current_prices
        source: imf_datamapper
        enabled: true
        indicator_code: "NGDPDPC"
        geo_level: country
        frequency: A
        time:
          mode: past_and_future_years
          past_years: 10
          future_years: 5
        units: "dollars_per_capita"
        reference: "https://www.imf.org/external/datamapper/NGDPDPC@WEO/ADVEC/WEOWORLD"

      - id: "E5"
        name: real_gdp_growth_percent
        source: imf_datamapper
        enabled: true
        indicator_code: "NGDP_RPCH"
        geo_level: country
        frequency: A
        time:
          mode: past_and_future_years
          past_years: 5
          future_years: 5
        units: "percent"
        reference: "https://www.imf.org/external/datamapper/NGDP_RPCH@WEO/ADVEC/WEOWORLD"

      - id: "E6"
        name: inflation_average_consumer_prices
        source: imf_datamapper
        enabled: true
        indicator_code: "PCPIEPCH"
        geo_level: country
        frequency: A
        time:
          mode: past_and_future_years
          past_years: 5
          future_years: 5
        units: "percent"
        reference: "https://www.imf.org/external/datamapper/PCPIEPCH@WEO/ADVEC/WEOWORLD"

      - id: "E7"
        name: consumer_confidence_index
        source: oecd
        enabled: true

        dataset_id: "OECD.SDD.STES,DSD_STES@DF_CLI,"
        # 9 dimensions:
        # REF_AREA.FREQ.MEASURE.UNIT_MEASURE.ACTIVITY.ADJUSTMENT.TRANSFORMATION.TIME_HORIZ.METHODOLOGY
        selection_template: "{geo}.M.CCICP...AA...H"

        frequency: M
        time:
          mode: past_years
          years: 5

        units: "index"
        geo_level: country

      - id: "E8"
        name: household_disposable_income
        source: oecd
        enabled: true

        dataset_id: "OECD.SDD.NAD,DSD_NAAG@DF_NAAG_V,1.0"
        selection_template: "A.{geo}.B6GS1M_POP.USD_PPP_PS."

        frequency: A
        time:
          mode: past_years
          years: 10

        units: "usd_dollars_per_person_PPP"
        geo_level: country
        reference: "https://www.oecd.org/en/data/indicators/household-disposable-income.html"

      - id: "E9"
        name: unemployment_rate_under_25_total
        source: eurostat
        enabled: true
        dataset: teilm021
        geo_level: country
        frequency: M
        time:
          mode: past_years
          years: 10

        filters:
          s_adj: "SA"
          age: "Y_LT25"
          sex: "T"
          unit: "PC_ACT"

        units: "percent_of_labour_force"
        allow_aggregates: true
        reference: "https://ec.europa.eu/eurostat/databrowser/view/teilm021/default/table?lang=en"

      - id: "E10"
        name: unemployment_rate_25_74_total
        source: eurostat
        enabled: true
        dataset: teilm022
        geo_level: country
        frequency: M

        time:
          mode: past_years
          years: 10

        filters:
          s_adj: "SA"
          age: "Y25-74"   # <-- CONFIRMAR en describe_dataset
          sex: "T"
          unit: "PC_ACT"

        units: "percent_of_labour_force"
        allow_aggregates: true
        reference: "https://ec.europa.eu/eurostat/databrowser/view/teilm022/default/table?lang=en"