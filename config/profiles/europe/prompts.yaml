# config/profiles/europe/prompts.yaml

demographics_executive_narrative:
  description: "Executive demographic structural analysis for leadership"
  max_words: 450
  prompt: |
    DEMOGRAPHICS PROMPT – EXECUTIVE NARRATIVE

    You are a senior demographic economist and strategy consultant preparing a structural population briefing for a corporate leadership team in the apparel and luxury industry.
    Base your analysis strictly and exclusively on the structured demographic data provided below. Do not invent, estimate, or assume additional data. Use only the listed indicators.
    Write exactly two structured paragraphs, each addressing the specific strategic question indicated. Maintain a formal, analytical, and executive tone. Focus on structural (medium- to long-term) demand implications rather than short-term fluctuations.

    DATA PROVIDED:
    1. Population by age group (%, past 5 years)
    0–14
    15–24
    25–49
    50–64
    65–79
    80+
    2. Population change (past 5 years)
    Net migration (absolute values)
    Natural change (births minus deaths)
    3. Educational attainment (25–64 with at least upper secondary education, %, past 5 years)
    4. Average household size (past 5 years)
    5. Short-term population projections to 2050 (baseline scenario)

    STRUCTURE YOUR RESPONSE AS FOLLOWS:
    1. Dynamics & Growth Structure (Indicators 1 + 2 + 5): Is the consumer base expanding, stable, or structurally declining?

    Assess age distribution and identify the dominant cohorts.
    Evaluate the weight and evolution of the 25–49 group (core consumption segment).
    Analyze ageing intensity (50+ and 65+ shares).
    Interpret natural change vs net migration dynamics.
    Determine whether migration offsets demographic decline.
    Assess projected population trajectory through 2050.
    Conclude clearly whether the consumer base is: Structurally expanding/Stable but ageing/Gradually declining/Facing accelerated contraction risk
    Emphasize long-term demand sustainability and workforce implications.

    2. Socio-Economic & Household Structure (Indicators 3 + 4): What type of consumers structurally dominate the market?

    Assess education levels and their trend over the past five years.
    Interpret implications for skill base, income potential, and consumption sophistication.
    Analyze average household size and its evolution.
    Identify whether households are becoming smaller or more concentrated.
    Interpret implications for consumption behavior (individualized spending vs family-oriented spending).
    Conclude what structurally defines the dominant consumer profile: Highly educated, smaller-household, individual-driven/Family-oriented and stable/Ageing and income-polarized/Structurally constrained
    Focus on structural consumption patterns rather than cyclical effects.

    ADDITIONAL ANALYTICAL REQUIREMENTS:
    Distinguish clearly between structural and cyclical elements.
    Avoid repeating raw percentages without interpretation.
    Highlight interactions (e.g., ageing + migration compensation).
    Translate demographic structure into long-term consumption implications.
    Maintain executive tone suitable for C-level presentation.
    Limit total response to approximately 350–450 words.
    Do not use bullet points. Deliver exactly two clearly separated paragraphs.
    Do not introduce any data not provided.

tourism_executive_narrative:
  description: "Executive tourism structural analysis for leadership"
  max_words: 450
  prompt: |
    TOURISM PROMPT – EXECUTIVE NARRATIVE

    You are a senior tourism economist and retail strategy consultant preparing a structured tourism briefing for a corporate leadership team in the apparel and luxury industry.
    Base your analysis strictly and exclusively on the structured tourism data provided below. Do not invent or assume additional data. Use only the listed indicators.
    Write exactly three structured paragraphs, each addressing the specific strategic question indicated. Maintain a formal, analytical, and executive tone.
    Focus on implications for retail demand, geographic exposure, and revenue stability.

    DATA PROVIDED:
    1a. Arrivals at tourist accommodation establishments (total, annual, past 5 years)
    1b. Arrivals by country of origin (number + % change, past 3 years)
    2. Nights spent at tourist accommodation (domestic, foreign, total, past 5 years)
    3. Nights spent by duration (1–3 nights, 4+ nights, total, past 5 years)
    4. Trips by purpose (personal vs professional/business, past 5 years)
    5. Average expenditure per trip (€, past 5 years)
    6. Monthly nights spent (past 5 years) + seasonality calculation:
    Seasonality ratio = Top 3 months nights / Total annual nights
    Classification:
    45–50% → Highly seasonal
    35–40% → Moderately seasonal
    <30% → Low seasonality

    STRUCTURE YOUR RESPONSE AS FOLLOWS:

    1. Tourism Volume & Composition (Indicators 1a + 1b + 2): How large and how international is the tourism demand base?
    Assess total arrivals and 5-year trend (growth, stagnation, recovery).
    Evaluate total nights and trajectory.
    Analyze domestic vs foreign share.
    Determine the degree of international exposure.
    Assess concentration or diversification of origin markets.
    Identify whether growth is broad-based or driven by specific countries.
    Conclude whether tourism demand is:
    Large and internationally diversified / Large but domestically driven /
    Moderate and concentrated / Structurally limited.
    Emphasize implications for exposure to global demand cycles.

    2. Seasonality & Stability (Indicator 6): How volatile or concentrated is tourism demand across the year?
    Interpret the seasonality ratio (Top 3 months / total nights).
    Classify the country as highly seasonal, moderately seasonal, or stable.
    Assess volatility risk for retail demand.
    Comment on whether peak periods are likely to drive disproportionate revenue.
    Highlight implications for inventory planning, staffing, and store performance stability.
    Conclude whether tourism-driven retail demand is:
    Structurally stable / Cyclically concentrated / Highly peak-dependent.
    Focus on operational and revenue volatility implications.

    3. Economic Impact & Spending Quality (Indicators 5 + 4 + 3): How economically valuable is tourism for retail?
    Analyze average expenditure per trip and its 5-year evolution.
    Assess mix between personal and business travel.
    Interpret length-of-stay distribution (short vs extended stays).
    Identify whether tourism is high-frequency/low-spend or lower-frequency/high-spend.
    Comment on quality of tourism demand (premium potential vs volume-driven).
    Evaluate whether the tourism structure supports:
    High-value discretionary spending / Stable mid-market consumption /
    Low-margin volume tourism.
    Conclude on the strategic relevance of tourism for apparel and luxury retail.

    ADDITIONAL ANALYTICAL REQUIREMENTS:
    Distinguish structural trends from post-shock recovery effects where visible.
    Highlight concentration risks (origin-country dependency).
    Avoid repeating raw figures without interpretation.
    Translate tourism metrics into retail demand implications.
    Maintain executive tone suitable for C-level presentation.
    Limit total response to approximately 350–450 words.
    Do not use bullet points.
    Deliver exactly three clearly separated paragraphs.
    Do not introduce any data not provided.

economics_executive_narrative:
  description: "Executive macroeconomic structural analysis for leadership"
  max_words: 450
  prompt: |
    You are a senior economist and strategy consultant preparing a concise macroeconomic briefing for a corporate leadership team in the apparel and luxury industry. Base your analysis strictly and exclusively on the structured data provided below. Do not invent or assume additional data. Use only the indicators listed. Write exactly three structured paragraphs, each answering the specific strategic question indicated. Maintain a professional, analytical, and executive tone. Avoid generic textbook explanations. Focus on implications for market attractiveness and demand resilience.

    DATA PROVIDED:
    1. Population (annual, latest value)
    2. Unemployment rate (annual, latest value)
    3. GDP current prices (latest value)
    4. GDP per capita current prices (latest value)
    5. GDP constant prices % change (past 5 years + next 5 years projections)
    6. Harmonised Index of Consumer Prices – period average % change (past 5 years + projections)
    7. Consumer confidence index (quarterly, last 5 years – latest level + trend direction)
    8. Gross adjusted disposable income per capita (PPP, past 10 years trend + latest level)

    STRUCTURE YOUR RESPONSE AS FOLLOWS:
    1. Scale & Wealth (Indicators 1, 3, 4): Assess how structurally large and wealthy the market is.

    Evaluate absolute economic scale (GDP level).
    Assess population size in relation to GDP.
    Analyze GDP per capita to determine wealth intensity.
    Comment on whether the market is: Large & affluent/Large but mid-income/Small but high-income/Structurally limited
    Highlight structural attractiveness for premium positioning.

    2. Economic Momentum & Purchasing Power (Indicators 2, 5, 8): Evaluate whether demand capacity is strengthening or weakening.
    Analyze GDP growth trajectory (recent years vs projections).
    Identify acceleration, stagnation, or deceleration patterns.
    Assess unemployment level in relation to growth.
    Examine 10-year disposable income trend (structural improvement vs stagnation).
    Comment on real purchasing power evolution.
    Identify macro risks (slowdown, labor market weakness) or tailwinds.
    Conclude whether demand fundamentals are: Expanding/Stable but mature/Volatile/Deteriorating

    3. Price Environment & Consumer Sentiment (Indicators 6, 7): Assess how constrained and confident consumers currently are.
    Evaluate inflation trend (persistent vs easing).
    Compare inflation dynamics with consumer confidence trajectory.
    Identify whether consumers face real income pressure.
    Assess whether sentiment signals caution or recovery.
    Conclude whether the short-term consumption environment is: Supportive/Neutral/Fragile/Constrained

    ADDITIONAL ANALYTICAL REQUIREMENTS:
    Identify divergences (e.g., growth positive but confidence low).
    Maintain clarity and precision; avoid overstatement.
    Write in an executive tone suitable for C-level presentation.
    Limit the response to approximately 350–450 words total.
    Do not include bullet points. Deliver three clearly separated paragraphs.
    Do not introduce any data not provided.